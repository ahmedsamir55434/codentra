services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: ${MONGO_DATABASE:-codentra}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-codentra}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change_this_strong_password}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_session_secret_32_chars}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_32_chars}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - data_snapshots:/app/data
    networks:
      - codentra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-codentra}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change_this_strong_password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-codentra}
    volumes:
      - mongo_data:/data/db
    networks:
      - codentra-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" mongodb://127.0.0.1:27017/admin | grep 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/app/uploads:ro
    networks:
      - codentra-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:
  uploads_data:
  data_snapshots:

networks:
  codentra-network:
    driver: bridge
